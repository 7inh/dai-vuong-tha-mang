<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đại Vương Tha Mạng — Reader</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --panel: #fffdf9;
      --ink: #1c1917;
      --muted: #78716c;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
      --border: #e7e5e4;
      --serif: "Literata", "Source Serif 4", "Noto Serif", Georgia, serif;
      --sans: "Be Vietnam Pro", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 10% -10%, #dbeafe 0%, transparent 55%),
        radial-gradient(900px 500px at 100% 0%, #fde68a55 0%, transparent 50%),
        var(--bg);
      min-height: 100vh;
    }
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 1.25rem 1rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .sidebar h1 {
      font-size: 1.05rem;
      margin: 0 0 0.35rem;
      line-height: 1.35;
      font-family: var(--serif);
    }
    .sidebar .meta {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 0.85rem;
    }
    .range-box {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 1rem;
      background: #fafaf9;
    }
    .range-box .label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.55rem;
    }
    .range-row {
      display: grid;
      gap: 0.4rem;
      margin-bottom: 0.55rem;
    }
    .range-row label {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .range-row select {
      width: 100%;
      font: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: white;
      color: var(--ink);
    }
    .range-box .actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.35rem;
    }
    .range-box button {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--accent);
      color: white;
      border-radius: 8px;
      padding: 0.5rem 0.6rem;
      cursor: pointer;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .range-box button.secondary {
      background: var(--panel);
      color: var(--ink);
    }
    .range-box button:hover { filter: brightness(0.96); }
    .toc {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .toc-item {
      text-align: left;
      border: none;
      background: transparent;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      font-size: 0.88rem;
      color: var(--ink);
      line-height: 1.35;
    }
    .toc-item:hover { background: #f5f5f4; }
    .toc-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }
    .main {
      padding: 1.5rem 1.75rem 3rem;
      max-width: 48rem;
      width: 100%;
      margin: 0 auto;
    }
    .toolbar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1.25rem;
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--bg) 88%, white);
      backdrop-filter: blur(8px);
      padding: 0.65rem 0;
      z-index: 2;
    }
    .toolbar button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      font: inherit;
      font-size: 0.9rem;
    }
    .toolbar button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .toolbar button:not(:disabled):hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .range-summary {
      color: var(--muted);
      font-size: 0.88rem;
      margin-left: 0.25rem;
    }
    .chapter-block {
      margin-bottom: 2.75rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .chapter-block:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .chapter-heading {
      font-family: var(--serif);
      font-size: clamp(1.35rem, 2.5vw, 1.75rem);
      margin: 0 0 1rem;
      line-height: 1.3;
      color: var(--accent);
    }
    .chapter-body {
      font-family: var(--serif);
      font-size: 1.12rem;
      line-height: 1.85;
    }
    .chapter-body p { margin: 0 0 0.95em; }
    .chapter-body .error { color: #b91c1c; }
    .menu-toggle {
      display: none;
      margin-bottom: 0.75rem;
    }
    .boot-msg {
      color: var(--muted);
      font-size: 1rem;
      padding: 2rem 0;
    }
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(86vw, 300px);
        transform: translateX(-105%);
        transition: transform 0.2s ease;
        z-index: 10;
        box-shadow: 8px 0 30px #0002;
      }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: inline-block; }
      .main { padding: 1rem 1rem 2.5rem; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=Literata:opsz,wght@7..72,400;7..72,600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h1 id="storyTitle">Đại Vương Tha Mạng</h1>
      <div class="meta" id="metaLine">Đang tải…</div>
      <div class="range-box">
        <div class="label">Chọn khoảng chương</div>
        <div class="range-row">
          <label for="fromSelect">Từ chương</label>
          <select id="fromSelect"></select>
        </div>
        <div class="range-row">
          <label for="toSelect">Đến chương</label>
          <select id="toSelect"></select>
        </div>
        <div class="actions">
          <button type="button" id="loadRangeBtn">Xem khoảng</button>
          <button type="button" class="secondary" id="resetRangeBtn">1 chương</button>
        </div>
      </div>
      <nav class="toc" id="toc"></nav>
    </aside>
    <main class="main">
      <button type="button" class="menu-toggle toolbar" id="menuBtn" style="border:1px solid var(--border);background:var(--panel);border-radius:8px;padding:0.5rem 0.9rem;cursor:pointer;font:inherit;">Mục lục</button>
      <div class="toolbar">
        <button type="button" id="prevBtn" disabled>← Trước</button>
        <button type="button" id="nextBtn" disabled>Sau →</button>
        <span class="range-summary" id="rangeSummary"></span>
      </div>
      <div id="reader"><p class="boot-msg">Đang tải danh sách chương…</p></div>
    </main>
  </div>
  <script>
    const STORY = "Đại Vương Tha Mạng";
    const textCache = new Map();

    const reader = document.getElementById("reader");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const toc = document.getElementById("toc");
    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.getElementById("menuBtn");
    const fromSelect = document.getElementById("fromSelect");
    const toSelect = document.getElementById("toSelect");
    const loadRangeBtn = document.getElementById("loadRangeBtn");
    const resetRangeBtn = document.getElementById("resetRangeBtn");
    const rangeSummary = document.getElementById("rangeSummary");
    const metaLine = document.getElementById("metaLine");
    const storyTitle = document.getElementById("storyTitle");

    let CHAPTERS = [];
    let byN = {};
    let rangeFrom = 1;
    let rangeTo = 1;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function textToHtml(text) {
      text = (text || "").trim();
      if (!text) return "";
      let paras = text.split(/\n\n+/).map((p) => p.trim()).filter(Boolean);
      if (paras.length <= 1 && text.includes("\n")) {
        paras = text.split(/\n+/).map((p) => p.trim()).filter(Boolean);
      }
      if (!paras.length) paras = [text];
      return paras
        .map((p) => `<p>${escapeHtml(p).replace(/\n/g, "<br/>")}</p>`)
        .join("");
    }

    async function loadChapterText(ch) {
      const path = ch.path || `chapters/chuong-${ch.n}.txt`;
      if (textCache.has(path)) return textCache.get(path);
      const resp = await fetch(path);
      if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${path}`);
      const text = await resp.text();
      textCache.set(path, text);
      return text;
    }

    function clampPair(a, b) {
      let from = Math.min(a, b);
      let to = Math.max(a, b);
      if (!(from in byN)) from = CHAPTERS[0].n;
      if (!(to in byN)) to = CHAPTERS[CHAPTERS.length - 1].n;
      return [from, to];
    }

    async function showRange(fromN, toN) {
      [rangeFrom, rangeTo] = clampPair(Number(fromN), Number(toN));
      fromSelect.value = String(rangeFrom);
      toSelect.value = String(rangeTo);

      const selected = CHAPTERS.filter((c) => c.n >= rangeFrom && c.n <= rangeTo);
      reader.innerHTML = '<p class="boot-msg">Đang tải nội dung…</p>';

      const blocks = await Promise.all(
        selected.map(async (ch) => {
          try {
            const text = await loadChapterText(ch);
            return `
              <section class="chapter-block" id="chuong-${ch.n}">
                <h2 class="chapter-heading">${escapeHtml(ch.title)}</h2>
                <article class="chapter-body">${textToHtml(text)}</article>
              </section>`;
          } catch (err) {
            return `
              <section class="chapter-block" id="chuong-${ch.n}">
                <h2 class="chapter-heading">${escapeHtml(ch.title)}</h2>
                <article class="chapter-body"><p class="error">Không tải được chương: ${escapeHtml(err.message)}</p></article>
              </section>`;
          }
        })
      );
      reader.innerHTML = blocks.join("");

      const count = selected.length;
      rangeSummary.textContent =
        count === 1
          ? selected[0].title
          : `Chương ${rangeFrom} → ${rangeTo} (${count} chương)`;

      toc.querySelectorAll(".toc-item").forEach((el) => {
        const n = Number(el.dataset.n);
        el.classList.toggle("active", n >= rangeFrom && n <= rangeTo);
      });

      const firstIdx = CHAPTERS.findIndex((c) => c.n === rangeFrom);
      const lastIdx = CHAPTERS.findIndex((c) => c.n === rangeTo);
      prevBtn.disabled = firstIdx <= 0;
      nextBtn.disabled = lastIdx >= CHAPTERS.length - 1;

      const hash =
        rangeFrom === rangeTo
          ? "#chuong-" + rangeFrom
          : "#chuong-" + rangeFrom + "-" + rangeTo;
      history.replaceState(null, "", hash);
      window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
    }

    function showOne(n) {
      return showRange(n, n);
    }

    function buildToc() {
      const frag = document.createDocumentFragment();
      CHAPTERS.forEach((c, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "toc-item";
        btn.dataset.index = String(i);
        btn.dataset.n = String(c.n);
        btn.textContent = c.title;
        frag.appendChild(btn);
      });
      toc.replaceChildren(frag);

      const opts = CHAPTERS.map(
        (c) => `<option value="${c.n}">${escapeHtml(c.title)}</option>`
      ).join("");
      fromSelect.innerHTML = opts;
      toSelect.innerHTML = opts;
    }

    function wireEvents() {
      loadRangeBtn.addEventListener("click", () => {
        showRange(fromSelect.value, toSelect.value);
        sidebar.classList.remove("open");
      });
      resetRangeBtn.addEventListener("click", () => {
        showOne(Number(fromSelect.value));
        sidebar.classList.remove("open");
      });
      fromSelect.addEventListener("change", () => {
        if (Number(fromSelect.value) > Number(toSelect.value)) {
          toSelect.value = fromSelect.value;
        }
      });
      toSelect.addEventListener("change", () => {
        if (Number(toSelect.value) < Number(fromSelect.value)) {
          fromSelect.value = toSelect.value;
        }
      });
      toc.addEventListener("click", (e) => {
        const btn = e.target.closest(".toc-item");
        if (!btn) return;
        showOne(Number(btn.dataset.n));
        sidebar.classList.remove("open");
      });
      prevBtn.addEventListener("click", () => {
        const firstIdx = CHAPTERS.findIndex((c) => c.n === rangeFrom);
        if (firstIdx <= 0) return;
        const span = rangeTo - rangeFrom;
        const newFrom = CHAPTERS[Math.max(0, firstIdx - 1 - span)].n;
        const newTo = CHAPTERS[firstIdx - 1].n;
        showRange(newFrom, newTo);
      });
      nextBtn.addEventListener("click", () => {
        const lastIdx = CHAPTERS.findIndex((c) => c.n === rangeTo);
        if (lastIdx >= CHAPTERS.length - 1) return;
        const span = rangeTo - rangeFrom;
        const newFrom = CHAPTERS[lastIdx + 1].n;
        const newTo = CHAPTERS[Math.min(CHAPTERS.length - 1, lastIdx + 1 + span)].n;
        showRange(newFrom, newTo);
      });
      menuBtn.addEventListener("click", () => sidebar.classList.toggle("open"));
    }

    async function boot() {
      try {
        const resp = await fetch("chapters.json");
        if (!resp.ok) throw new Error(`chapters.json HTTP ${resp.status}`);
        CHAPTERS = await resp.json();
        if (!CHAPTERS.length) throw new Error("chapters.json rỗng");
        CHAPTERS.sort((a, b) => a.n - b.n);
        byN = Object.fromEntries(CHAPTERS.map((c) => [c.n, c]));

        const story = CHAPTERS[0].story || STORY;
        storyTitle.textContent = story;
        document.title = `${story} — Reader`;
        metaLine.textContent = `${CHAPTERS.length} chương · đọc offline`;

        buildToc();
        wireEvents();

        const rangeHash = location.hash.match(/chuong-(\d+)-(\d+)/);
        const singleHash = location.hash.match(/chuong-(\d+)/);
        if (rangeHash) {
          await showRange(rangeHash[1], rangeHash[2]);
        } else if (singleHash) {
          await showOne(Number(singleHash[1]));
        } else {
          await showOne(CHAPTERS[0].n);
        }
      } catch (err) {
        reader.innerHTML = `<p class="boot-msg error">Không tải được thư viện: ${escapeHtml(err.message)}</p>`;
        metaLine.textContent = "Lỗi tải";
      }
    }

    boot();
  </script>
</body>
</html>
